<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bridge Fluent — Tradução e aprendizado inclusivo com IA">
  <title>Bridge Fluent</title>
  <style>
    /* === CSS VARIABLES === */
    :root[data-theme="dark"] {
      --bg: #0F2A47;
      --surface: #1E3A5F;
      --surface-elevated: #2A4A75;
      --accent: #F59E0B;
      --accent-hover: #FBBF24;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
      --border: #334155;
      --success: #22C55E;
      --error: #EF4444;
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
      --radius: 14px;
    }
    :root[data-theme="light"] {
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --surface-elevated: #F1F5F9;
      --accent: #F59E0B;
      --accent-hover: #D97706;
      --text: #0F2A47;
      --text-muted: #64748B;
      --border: #E2E8F0;
      --success: #16A34A;
      --error: #DC2626;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 14px;
    }
    /* === RESET === */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    /* === HEADER === */
    #app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .logo { font-size: 18px; font-weight: 700; }
    .logo span { color: var(--accent); }
    .theme-toggle {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--surface-elevated);
      font-size: 18px;
    }
    /* === MAIN === */
    #app-main {
      flex: 1;
      padding: 20px;
      padding-bottom: 100px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }
    /* === BOTTOM NAV === */
    #bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
      z-index: 10;
    }
    #bottom-nav a {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text-muted);
      border-radius: var(--radius);
      transition: color 0.2s;
    }
    #bottom-nav a:hover, #bottom-nav a.active { color: var(--accent); }
    #bottom-nav .nav-icon { font-size: 22px; }
  </style>
</head>
<body>
  <header id="app-header">
    <div class="logo">Bridge <span>Fluent</span></div>
    <button class="theme-toggle" aria-label="Alternar tema">🌙</button>
  </header>
  <main id="app-main">
    <!-- Views renderizadas aqui -->
  </main>
  <nav id="bottom-nav">
    <a href="#/" class="active" aria-label="Home">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="#/tradutor" aria-label="Tradutor">
      <span class="nav-icon">🎤</span>
      <span>Tradutor</span>
    </a>
    <a href="#/dicionario" aria-label="Dicionário">
      <span class="nav-icon">📖</span>
      <span>Dicionário</span>
    </a>
    <a href="#/aulas" aria-label="Aulas">
      <span class="nav-icon">🎓</span>
      <span>Aulas</span>
    </a>
  </nav>
</body>
</html>
