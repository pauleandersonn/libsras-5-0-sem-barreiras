<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bridge Fluent — Tradução e aprendizado inclusivo com IA">
  <title>Bridge Fluent</title>
  <style>
    /* === CSS VARIABLES === */
    :root[data-theme="dark"] {
      --bg: #0F2A47;
      --surface: #1E3A5F;
      --surface-elevated: #2A4A75;
      --accent: #F59E0B;
      --accent-hover: #FBBF24;
      --text: #F8FAFC;
      --text-muted: #94A3B8;
      --border: #334155;
      --success: #22C55E;
      --error: #EF4444;
      --shadow: 0 4px 12px rgba(0,0,0,0.3);
      --radius: 14px;
    }
    :root[data-theme="light"] {
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --surface-elevated: #F1F5F9;
      --accent: #F59E0B;
      --accent-hover: #D97706;
      --text: #0F2A47;
      --text-muted: #64748B;
      --border: #E2E8F0;
      --success: #16A34A;
      --error: #DC2626;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 14px;
    }
    /* === RESET === */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    /* === HEADER === */
    #app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .logo { font-size: 18px; font-weight: 700; }
    .logo span { color: var(--accent); }
    .theme-toggle {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--surface-elevated);
      font-size: 18px;
    }
    /* === MAIN === */
    #app-main {
      flex: 1;
      padding: 20px;
      padding-bottom: 100px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }
    /* === BOTTOM NAV === */
    #bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
      z-index: 10;
    }
    #bottom-nav a {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text-muted);
      border-radius: var(--radius);
      transition: color 0.2s;
    }
    #bottom-nav a:hover, #bottom-nav a.active { color: var(--accent); }
    #bottom-nav .nav-icon { font-size: 22px; }    /* === TOASTS === */
    #toast-container {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--surface-elevated);
      color: var(--text);
      padding: 12px 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border-left: 4px solid var(--accent);
      font-size: 14px;
      max-width: 90vw;
      animation: toast-in 0.3s ease-out, toast-out 0.3s ease-in 2.7s forwards;
    }
    .toast.success { border-left-color: var(--success); }
    .toast.error { border-left-color: var(--error); }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toast-out {
      to { opacity: 0; transform: translateY(-20px); }
    }
  </style>
</head>

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return structuredClone(defaultState);
        return { ...structuredClone(defaultState), ...JSON.parse(raw) };
      } catch (e) {
        console.warn('localStorage indisponível:', e);
        return structuredClone(defaultState);
      }
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

        console.warn('Não foi possível salvar:', e);
      }

    /* === TEMA === */
    function applyTheme(tema) {
      document.documentElement.setAttribute('data-theme', tema);
      const btn = document.querySelector('.theme-toggle');
      if (btn) btn.textContent = tema === 'dark' ? '🌙' : '☀️';
      state.user.tema = tema;
      saveState();
    }

    function initTheme() {
      applyTheme(state.user.tema);
      document.querySelector('.theme-toggle').addEventListener('click', () => {
        applyTheme(state.user.tema === 'dark' ? 'light' : 'dark');
      });
    }

    /* === ROTEAMENTO === */
    const routes = {
      '#/': () => renderHome(),
      '#/tradutor': () => renderTradutor(),
      '#/dicionario': () => renderDicionario(),
      '#/aulas': () => renderAulas()
    };

    function router() {
      const hash = location.hash || '#/';
      const main = document.getElementById('app-main');
      const renderer = routes[hash];
      if (!renderer) {
        main.innerHTML = '<p>Rota não encontrada.</p>';
        return;
      }
      renderer();
      // Atualiza bottom nav
      document.querySelectorAll('#bottom-nav a').forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === hash);
      });
      window.scrollTo(0, 0);
    }

    function navigate(hash) {
      if (location.hash === hash) {
        router(); // re-renderiza se já está na rota
      } else {
        location.hash = hash;
      }
    }

    /* === VIEW STUBS (preenchidos nas próximas tasks) === */

    function renderDicionario() { document.getElementById('app-main').innerHTML = '<h1>Dicionário</h1><p>Em construção.</p>'; }
    function renderAulas() { document.getElementById('app-main').innerHTML = '<h1>Aulas</h1><p>Em construção.</p>'; }

    /* === UTILITARIOS === */
    function showToast(mensagem, tipo = 'info') {
      const container = document.getElementById('toast-container');
      if (!container) { console.warn('toast-container ausente'); return; }
      const toast = document.createElement('div');
      toast.className = `toast ${tipo}`;
      toast.textContent = mensagem;
      toast.setAttribute('role', 'status');
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function formatDate(isoString) {
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return '';
      const agora = new Date();
      const diffMs = agora - date;
      const diffMin = Math.floor(diffMs / 60000);
      const diffHoras = Math.floor(diffMs / 3600000);
      const diffDias = Math.floor(diffMs / 86400000);
      if (diffMin < 1) return 'agora';
      if (diffMin < 60) return `há ${diffMin} min`;
      if (diffHoras < 24) return `há ${diffHoras} h`;
      if (diffDias < 7) return `há ${diffDias} d`;
      return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
    }

    function formatDuration(segundos) {
      const total = Math.max(0, Math.floor(Number(segundos) || 0));
      const min = Math.floor(total / 60);
      const seg = total % 60;
      if (min === 0) return `${seg}s`;
      return `${min}min ${seg}s`;
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    /* === INIT === */
    window.addEventListener('hashchange', router);
    window.addEventListener('DOMContentLoaded', () => {
      initTheme();
      router();
    });
  </script>
